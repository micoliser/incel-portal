name: ci-cd

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish to GHCR
        required: false
        default: latest
      frontend_api_base_url:
        description: Public API base URL baked into the frontend image
        required: false
        default: https://workspaceapi.incelgroup.com/api/v1

permissions:
  contents: read
  packages: write

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: incel_portal_db
          POSTGRES_USER: incel_portal_user
          POSTGRES_PASSWORD: incel_portal_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U incel_portal_user -d incel_portal_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: incel_portal_db
      DB_USER: incel_portal_user
      DB_PASSWORD: incel_portal_password
      AWS_S3_BUCKET_NAME: ci-bucket
      AWS_S3_REGION_NAME: us-east-1
      AWS_APPLICATION_LOGO_S3_PREFIX: application-logos
      AWS_APPLICATION_LOGO_UPLOAD_URL_EXPIRES_IN: 900
      AWS_S3_OBJECT_ACL: public-read
      AWS_ACCESS_KEY_ID: ci-access-key
      AWS_SECRET_ACCESS_KEY: ci-secret-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        working-directory: api
        run: python manage.py check

      - name: Run Django tests
        working-directory: api
        run: python manage.py test

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ inputs.frontend_api_base_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install frontend dependencies
        working-directory: portal
        run: npm ci

      - name: Run frontend lint
        working-directory: portal
        run: npm run lint

      - name: Build frontend
        working-directory: portal
        run: npm run build

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    env:
      IMAGE_TAG: ${{ github.sha }}
      LATEST_TAG: ${{ inputs.image_tag }}
      FRONTEND_API_BASE_URL: ${{ inputs.frontend_api_base_url }}
      GHCR_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/incel-portal-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.GHCR_OWNER }}/incel-portal-backend:${{ env.LATEST_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./portal
          file: ./portal/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.FRONTEND_API_BASE_URL }}
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/incel-portal-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.GHCR_OWNER }}/incel-portal-frontend:${{ env.LATEST_TAG }}
